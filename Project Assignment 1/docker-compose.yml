services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: image-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      lan_net:
        ipv4_address: ${DB_STATIC_IP}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: image-analyzer-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${DB_STATIC_IP}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      app_net: {}
      lan_net:
        ipv4_address: ${BACKEND_STATIC_IP}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: image-analyzer-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      app_net: {}
      lan_net:
        ipv4_address: ${FRONTEND_STATIC_IP}

  frontend_local:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: image-analyzer-frontend-local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${FRONTEND_HOST_PORT:-8088}:80"
    networks:
      app_net: {}

networks:
  app_net:
    driver: bridge

  lan_net:
    external: true
    name: ${DOCKER_LAN_NETWORK}

volumes:
  postgres_data:
    name: image_analyzer_postgres_data
